services:
  - type: web
    name: shl-ai-agent
    runtime: python
    plan: free

    buildCommand: pip install -r requirements.txt

    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: GEMINI_API_KEY
        sync: false

      - key: MODEL_NAME
        value: gemini-2.5-flash